dist: xenial
language: python
python:
  - "3.6"
  - "3.7"

addons:
  postgresql: "10.7"

services:
  - postgresql

install:
  - pip install -r mentions/requirements.txt
  - pip install psycopg2

before_script:
  - psql -c "CREATE USER 'django-wm' WITH CREATEDB PASSWORD 'django-wm-tests';" -U postgres

script:
  - python runtests.py
